name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET || 'ci-build-only-secret' }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'ci@example.com' }}
      ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH || '$2b$10$CwTycUXWue0Thq9StjUM0uJ8f5xHn0SI7RyhokW2N7DbStO2Qd6aW' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
    steps:
      - name: Validate required GitHub secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: |
          set -euo pipefail
          required=(VPS_HOST VPS_USER VPS_SSH_KEY AUTH_COOKIE_SECRET ADMIN_EMAIL ADMIN_PASSWORD_HASH)
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: AUTH_COOKIE_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD_HASH
          script: |
            set -euo pipefail
            cd /var/www/baocaoluadao.com
            ./deploy.sh
